

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); }
.wrap { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem; }
h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); text-align: center; margin-bottom: 0.25rem; }
.subtitle { font-size: 14px; color: var(--color-text-secondary); text-align: center; margin-bottom: 1.5rem; }
.question-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg, 12px); padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.q-num { font-size: 13px; color: var(--color-text-secondary); min-width: 20px; }
.q-text { font-size: 16px; color: var(--color-text-primary); flex: 1; min-width: 160px; }
.q-input { width: 120px; height: 36px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,0.3)); border-radius: var(--border-radius-md, 8px); padding: 0 10px; font-size: 15px; background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.q-input:focus { box-shadow: 0 0 0 2px rgba(55,138,221,0.25); border-color: #378ADD; }
.q-result { font-size: 14px; font-weight: 500; min-width: 180px; }
.correct { color: var(--color-text-success); }
.wrong { color: var(--color-text-danger); }
.btn-row { display: flex; gap: 10px; margin-top: 1.25rem; }
button { height: 40px; padding: 0 20px; border: 0.5px solid var(--color-border-secondary, rgba(0,0,0,0.3)); border-radius: var(--border-radius-md, 8px); background: transparent; color: var(--color-text-primary); font-size: 15px; cursor: pointer; transition: background 0.15s; }
button:hover { background: var(--color-background-secondary); }
button:active { transform: scale(0.98); }
#btn-submit { flex: 1; }
#btn-reset { flex: 1; }
.score-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md, 8px); padding: 0.875rem 1.25rem; margin-top: 1rem; display: none; }
.score-title { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
.score-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.score-sub { font-size: 14px; color: var(--color-text-secondary); margin-top: 2px; }
</style>
<div class="wrap">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">小數乘法練習，共 5 題</h2>
  <h1>小數乘法練習</h1>
  <p class="subtitle">每次隨機出 5 題，填入答案後提交</p>
  <div id="questions"></div>
  <div class="btn-row">
    <button id="btn-submit">提交答案</button>
    <button id="btn-reset">重新開始</button>
  </div>
  <div class="score-box" id="score-box">
    <div class="score-title">本次成績</div>
    <div class="score-val" id="score-val"></div>
    <div class="score-sub" id="score-sub"></div>
  </div>
</div>
<script>
const ALL = [
  {q:"1.23 × 2.345", a:"2.88435"},
  {q:"3.45 × 1.278", a:"4.4091"},
  {q:"2.56 × 3.142", a:"8.04352"},
  {q:"4.78 × 2.163", a:"10.33914"},
  {q:"5.32 × 1.457", a:"7.75324"},
  {q:"6.14 × 2.238", a:"13.74132"},
  {q:"7.25 × 1.364", a:"9.889"},
  {q:"8.48 × 2.547", a:"21.59856"},
  {q:"9.63 × 1.728", a:"16.64064"},
  {q:"2.87 × 3.659", a:"10.50133"},
  {q:"3.91 × 2.486", a:"9.71926"},
  {q:"4.26 × 1.394", a:"5.93844"},
  {q:"5.78 × 2.673", a:"15.44994"},
  {q:"6.35 × 1.842", a:"11.6967"},
  {q:"7.92 × 2.157", a:"17.08344"},
  {q:"8.17 × 1.538", a:"12.56246"},
  {q:"9.44 × 2.386", a:"22.52384"},
  {q:"2.68 × 3.279", a:"8.78772"},
  {q:"3.74 × 1.968", a:"7.36032"},
  {q:"4.89 × 2.417", a:"11.81713"},
  {q:"5.67 × 1.283", a:"7.27461"},
  {q:"6.83 × 2.194", a:"14.98802"},
  {q:"7.56 × 1.479", a:"11.17824"},
  {q:"8.29 × 2.637", a:"21.85773"},
  {q:"9.15 × 1.846", a:"16.8909"}
];

let current = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick5() {
  return shuffle(ALL).slice(0, 5);
}

function render() {
  current = pick5();
  const box = document.getElementById('questions');
  box.innerHTML = current.map((item, i) => `
    <div class="question-card" id="card-${i}">
      <span class="q-num">${i + 1}.</span>
      <span class="q-text">${item.q} =</span>
      <input class="q-input" type="text" id="inp-${i}" placeholder="輸入答案" autocomplete="off" inputmode="decimal">
      <span class="q-result" id="res-${i}"></span>
    </div>
  `).join('');
  document.getElementById('score-box').style.display = 'none';
  document.getElementById('btn-submit').disabled = false;
}

function submit() {
  let correct = 0;
  current.forEach((item, i) => {
    const raw = document.getElementById(`inp-${i}`).value.trim();
    const resEl = document.getElementById(`res-${i}`);
    const userNum = parseFloat(raw);
    const ansNum = parseFloat(item.a);
    const isCorrect = raw !== '' && !isNaN(userNum) && userNum === ansNum && raw.replace(/\s/g,'') === item.a;
    if (isCorrect) {
      correct++;
      resEl.textContent = '✓ 正確';
      resEl.className = 'q-result correct';
    } else {
      resEl.textContent = `✗ 錯誤，正確答案是 ${item.a}`;
      resEl.className = 'q-result wrong';
    }
  });
  const pct = Math.round(correct / 5 * 100);
  const scoreBox = document.getElementById('score-box');
  document.getElementById('score-val').textContent = `答對 ${correct} / 5`;
  document.getElementById('score-sub').textContent = `答對率 ${pct}%`;
  scoreBox.style.display = 'block';
  document.getElementById('btn-submit').disabled = true;
}

document.getElementById('btn-submit').addEventListener('click', submit);
document.getElementById('btn-reset').addEventListener('click', render);

render();
</script>
