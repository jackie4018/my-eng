<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>張老師英文家教班 — 量詞練習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --primary: #2B4EAF;
    --primary-light: #EEF2FB;
    --accent: #E8640A;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: #E2E0DA;
    --correct: #16A34A;
    --correct-light: #DCFCE7;
    --wrong: #DC2626;
    --wrong-light: #FEE2E2;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 28px 24px 22px;
    text-align: center;
  }
  header .school {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { font-size: 13px; opacity: 0.7; margin-top: 6px; }

  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  /* Result banner */
  .result-banner {
    display: none;
    background: var(--card);
    border: 2px solid var(--primary);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .result-banner.show { display: block; }
  .result-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
  }
  .result-score span { font-size: 20px; color: var(--muted); }
  .result-sub { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .result-wrong { font-size: 15px; font-weight: 700; color: var(--wrong); margin-top: 8px; }

  /* Quiz card */
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .quiz-card.graded-correct { border-color: var(--correct); background: #f0fdf4; }
  .quiz-card.graded-wrong   { border-color: var(--wrong);   background: #fff5f5; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .card-num {
    background: var(--primary);
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-keyword {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--primary);
  }
  .card-badge {
    margin-left: auto;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 12px;
    display: none;
  }
  .graded-correct .card-badge { display: block; background: var(--correct); color: white; }
  .graded-wrong   .card-badge { display: block; background: var(--wrong);   color: white; }

  /* Row */
  .row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px 4px;
    margin-bottom: 7px;
    font-size: 14px;
    line-height: 1.7;
  }
  .row:last-child { margin-bottom: 0; }
  .row-label { color: var(--muted); font-size: 13px; white-space: nowrap; }
  hr.divider { border: none; border-top: 1px dashed var(--border); margin: 4px 0 7px; }

  /* Slot — chip style */
  .slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 88px;
    height: 30px;
    border: 1.5px dashed #9CA3AF;
    border-radius: 6px;
    padding: 0 8px;
    cursor: pointer;
    background: #F9F9F7;
    transition: border-color 0.15s, background 0.15s;
    font-size: 13px;
    font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
    font-weight: 600;
    color: var(--muted);
    position: relative;
  }
  .slot:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .slot.filled { border-style: solid; border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .slot.correct { border-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .slot.wrong   { border-color: var(--wrong);   background: var(--wrong-light);   color: var(--wrong); }

  /* Text input slot */
  .slot-input {
    display: inline-flex;
    align-items: center;
    min-width: 88px;
    height: 30px;
    border: none;
    border-bottom: 2px solid #9CA3AF;
    background: transparent;
    padding: 0 4px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .slot-input:focus { border-color: var(--primary); }
  .slot-input.correct { border-color: var(--correct); color: var(--correct); }
  .slot-input.wrong   { border-color: var(--wrong);   color: var(--wrong); }
  .slot-input:disabled { background: transparent; }

  /* Answer hint after grading */
  .answer-hint {
    font-size: 11px;
    color: var(--correct);
    font-weight: 700;
    margin-left: 1px;
    display: none;
  }
  .graded .answer-hint { display: inline; }

  /* Picker overlay */
  .picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .picker-overlay.open { display: flex; }
  .picker-panel {
    background: white;
    border-radius: 18px 18px 0 0;
    padding: 22px 20px 40px;
    width: 100%;
    max-width: 720px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .picker-title {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .picker-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .picker-chip {
    background: #F3F4F6;
    color: #374151;
    border: 1.5px solid #E5E7EB;
    border-radius: 20px;
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .picker-chip:hover  { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .picker-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
  .picker-cancel {
    display: block;
    width: 100%;
    padding: 12px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }

  /* Submit */
  .submit-area { text-align: center; margin-top: 28px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .btn-submit {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px 52px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    box-shadow: 0 4px 16px rgba(232,100,10,0.25);
    transition: background 0.15s, transform 0.1s;
  }
  .btn-submit:hover  { background: #c9550a; }
  .btn-submit:active { transform: scale(0.97); }
  .btn-reset {
    display: none;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px 52px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.15s;
  }
  .btn-reset:hover { background: #1e3a8a; }
</style>
</head>
<body>

<header>
  <div class="school">張老師英文家教班</div>
  <h1>數量詞用法練習</h1>
  <p>點選空格選擇答案，意思欄位請手動輸入</p>
</header>

<div class="container">
  <div class="result-banner" id="resultBanner">
    <div class="result-score" id="resultScore">—<span id="resultTotal"> / —</span></div>
    <div class="result-sub">答對空格數</div>
    <div class="result-wrong" id="resultWrong"></div>
  </div>

  <div id="quizCont"></div>

  <div class="submit-area">
    <button class="btn-submit" id="btnSubmit" onclick="submitQuiz()">批改答案</button>
    <button class="btn-reset" id="btnReset" onclick="resetQuiz()">重新練習</button>
  </div>
</div>

<!-- Picker -->
<div class="picker-overlay" id="pickerOverlay" onclick="overlayClick(event)">
  <div class="picker-panel">
    <div class="picker-title">選擇答案</div>
    <div class="picker-chips" id="pickerChips"></div>
    <button class="picker-cancel" onclick="closePicker()">取消</button>
  </div>
</div>

<script>
// ── Options ──────────────────────────────────
const NOUN_OPTS = ['N可數複數', 'N可數單數', 'N不可數'];
const VERB_OPTS = ['單數', '複數'];

// ── Aliases for grading ───────────────────────
const ALIASES = {
  'N可數複數': ['N可數複數','N可數複','N可複數','N可複'],
  'N可數單數': ['N可數單數','N可數單','N可單數','N可單'],
  'N不可數':   ['N不可數','不可數'],
  '複數':      ['複數','V複數','V複'],
  '單數':      ['單數','V單數','V單'],
  '兩個都有':  ['兩個都有','2個都有'],
  '兩個其一':  ['兩個其一','2個其一','2個其中一個','兩個其中一個'],
  '兩個都沒有':['兩個都沒有','2個都沒有'],
  '一個':      ['一個','1個'],
  '兩個':      ['兩個','2個'],
};

function norm(v){ return (v||'').trim().replace(/\s/g,''); }
function isMatch(user, correct){
  const u = norm(user);
  const accepted = ALIASES[correct] || [correct];
  return accepted.some(a => norm(a) === u);
}
function checkAny(user, correctArr){
  return correctArr.some(c => isMatch(user, c));
}

// ── Paired noun groups (order-independent) ────
const NOUN_PAIRS = [
  ['all_n1','all_n2'],
  ['most_n1','most_n2'],
  ['alot_n1','alot_n2'],
  ['some_n1','some_n2'],
];
const PAIR_MAP = {};
NOUN_PAIRS.forEach(([a,b])=>{ PAIR_MAP[a]=b; PAIR_MAP[b]=a; });
const PAIR_EXPECTED = ['N可數複數','N不可數'];

// ── Quiz data ─────────────────────────────────
// token types:
//   string            → plain label
//   {type:'n', id}    → noun chip slot
//   {type:'v', id}    → verb chip slot
//   {type:'t', id}    → text input slot
// answer stored separately in ANSWERS map
const ANSWERS = {}; // slotId → correct answer(s) array

function def(id, correct){
  ANSWERS[id] = Array.isArray(correct) ? correct : [correct];
  return id;
}

function buildData(){
  return [
    { id:1, kw:'all', rows:[
      ['意思：', {type:'t',id:def('all_m',['全部','所有'])}, {type:'t',id:def('all_num',['3'])}, '個以上'],
      ['all +', {type:'n',id:def('all_n1','N可數複數')}, '/', {type:'n',id:def('all_n2','N不可數')}],
      ['all of the', {type:'n',id:def('all_o1n','N可數複數')}, 'V', {type:'v',id:def('all_o1v','複數')}],
      ['all of the', {type:'n',id:def('all_o2n','N不可數')}, 'V', {type:'v',id:def('all_o2v','單數')}],
    ]},
    { id:2, kw:'most', rows:[
      ['意思：', {type:'t',id:def('most_m','大部分')}],
      ['most +', {type:'n',id:def('most_n1','N可數複數')}, '/', {type:'n',id:def('most_n2','N不可數')}],
      ['most of the', {type:'n',id:def('most_o1n','N可數複數')}, 'V', {type:'v',id:def('most_o1v','複數')}],
      ['most of the', {type:'n',id:def('most_o2n','N不可數')}, 'V', {type:'v',id:def('most_o2v','單數')}],
    ]},
    { id:3, kw:'a lot of', rows:[
      ['意思：', {type:'t',id:def('alot_m','很多')}],
      ['a lot of +', {type:'n',id:def('alot_n1','N可數複數')}, '/', {type:'n',id:def('alot_n2','N不可數')}],
      ['a lot of the', {type:'n',id:def('alot_o1n','N可數複數')}, 'V', {type:'v',id:def('alot_o1v','複數')}],
      ['a lot of the', {type:'n',id:def('alot_o2n','N不可數')}, 'V', {type:'v',id:def('alot_o2v','單數')}],
    ]},
    { id:4, kw:'some', rows:[
      ['意思：', {type:'t',id:def('some_m','一些')}],
      ['some +', {type:'n',id:def('some_n1','N可數複數')}, '/', {type:'n',id:def('some_n2','N不可數')}],
      ['some of the', {type:'n',id:def('some_o1n','N可數複數')}, 'V', {type:'v',id:def('some_o1v','複數')}],
      ['some of the', {type:'n',id:def('some_o2n','N不可數')}, 'V', {type:'v',id:def('some_o2v','單數')}],
    ]},
    { id:5, kw:'many', rows:[
      ['意思：', {type:'t',id:def('many_m','很多')}],
      ['many +', {type:'n',id:def('many_n','N可數複數')}],
      ['many of the', {type:'n',id:def('many_on','N可數複數')}, 'V', {type:'v',id:def('many_ov','複數')}],
    ]},
    { id:6, kw:'much', rows:[
      ['意思：', {type:'t',id:def('much_m','很多')}],
      ['much +', {type:'n',id:def('much_n','N不可數')}],
      ['much of the', {type:'n',id:def('much_on','N不可數')}, 'V', {type:'v',id:def('much_ov','單數')}],
    ]},
    { id:7, kw:'a few / few', rows:[
      ['a few 意思：', {type:'t',id:def('afew_m','一些')}, '　few 意思：', {type:'t',id:def('few_m','少到幾乎沒有')}],
      ['(a) few +', {type:'n',id:def('afew_n','N可數複數')}],
      ['(a) few of the', {type:'n',id:def('afew_on','N可數複數')}, 'V', {type:'v',id:def('afew_ov','複數')}],
    ]},
    { id:8, kw:'a little / little', rows:[
      ['a little 意思：', {type:'t',id:def('alit_m','一些')}, '　little 意思：', {type:'t',id:def('lit_m','少到幾乎沒有')}],
      ['(a) little +', {type:'n',id:def('alit_n','N不可數')}],
      ['(a) little of the', {type:'n',id:def('alit_on','N不可數')}, 'V', {type:'v',id:def('alit_ov','單數')}],
    ]},
    { id:9, kw:'a number of', rows:[
      ['意思：', {type:'t',id:def('anum_m','一些')}],
      ['a number of +', {type:'n',id:def('anum_n','N可數複數')}],
      ['a number of the', {type:'n',id:def('anum_on','N可數複數')}, 'V', {type:'v',id:def('anum_ov','複數')}],
    ]},
    { id:10, kw:'several', rows:[
      ['意思：', {type:'t',id:def('sev_m','一些')}],
      ['several +', {type:'n',id:def('sev_n','N可數複數')}],
      ['several of the', {type:'n',id:def('sev_on','N可數複數')}, 'V', {type:'v',id:def('sev_ov','複數')}],
    ]},
    { id:11, kw:'both', rows:[
      ['意思：', {type:'t',id:def('both_m','兩個都有')}],
      ['both +', {type:'n',id:def('both_n','N可數複數')}],
      ['both of the', {type:'n',id:def('both_on','N可數複數')}, '(', {type:'t',id:def('both_num','2')}, '個) V', {type:'v',id:def('both_ov','複數')}],
    ]},
    { id:12, kw:'each', rows:[
      ['意思：', {type:'t',id:def('each_m','每一')}],
      ['each +', {type:'n',id:def('each_n','N可數單數')}],
      ['each of the', {type:'n',id:def('each_on','N可數複數')}, 'V', {type:'v',id:def('each_ov','單數')}],
    ]},
    { id:13, kw:'every', rows:[
      ['意思：', {type:'t',id:def('ev_m','每一')}],
      ['every +', {type:'n',id:def('ev_n','N可數單數')}],
      ['every', {type:'t',id:def('ev_one','one')}, 'of the', {type:'n',id:def('ev_on','N可數複數')}, 'V', {type:'v',id:def('ev_ov','單數')}],
    ]},
    { id:14, kw:'one', rows:[
      ['意思：', {type:'t',id:def('one_m','一個')}],
      ['one +', {type:'n',id:def('one_n','N可數單數')}],
      ['one of the', {type:'n',id:def('one_on','N可數複數')}, 'V', {type:'v',id:def('one_ov','單數')}],
    ]},
    { id:15, kw:'two', rows:[
      ['意思：', {type:'t',id:def('two_m','兩個')}],
      ['two +', {type:'n',id:def('two_n','N可數複數')}],
      ['two of the', {type:'n',id:def('two_on','N可數複數')}, '(', {type:'t',id:def('two_num','3')}, '個以上) V', {type:'v',id:def('two_ov','複數')}],
    ]},
    { id:16, kw:'either', rows:[
      ['意思：', {type:'t',id:def('ei_m','兩個其一')}],
      ['either +', {type:'n',id:def('ei_n','N可數單數')}],
      ['either of the', {type:'n',id:def('ei_on','N可數複數')}, 'V', {type:'v',id:def('ei_ov','單數')}],
    ]},
    { id:17, kw:'neither', rows:[
      ['意思：', {type:'t',id:def('nei_m','兩個都沒有')}],
      ['neither +', {type:'n',id:def('nei_n','N可數單數')}],
      ['neither of the', {type:'n',id:def('nei_on','N可數複數')}, 'V', {type:'v',id:def('nei_ov','單數')}],
    ]},
  ];
}

// ── State ─────────────────────────────────────
let quizData = [];
let userAnswers = {};   // slotId → string
let graded = false;
let activeSlot = null;  // { id, opts }

// ── Shuffle ───────────────────────────────────
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

// ── Render ────────────────────────────────────
function renderQuiz(){
  quizData = shuffle(buildData());
  const cont = document.getElementById('quizCont');
  cont.innerHTML = '';

  quizData.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = 'card-'+q.id;
    card.innerHTML = `<div class="card-header">
      <div class="card-num">${idx+1}</div>
      <div class="card-keyword">${q.kw}</div>
      <div class="card-badge" id="badge-${q.id}"></div>
    </div>`;

    q.rows.forEach((row, ri) => {
      if(ri>0){ const hr=document.createElement('hr'); hr.className='divider'; card.appendChild(hr); }
      const rowEl = document.createElement('div');
      rowEl.className = 'row';

      row.forEach(tok => {
        if(typeof tok === 'string'){
          const s = document.createElement('span');
          s.className = 'row-label';
          s.textContent = tok;
          rowEl.appendChild(s);
        } else if(tok.type === 't'){
          // text input
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.className = 'slot-input';
          inp.id = 'slot-'+tok.id;
          inp.placeholder = '　';
          inp.autocomplete = 'off';
          inp.style.width = tok.id.endsWith('_num') || tok.id === 'both_num' || tok.id === 'two_num' ? '42px' : '90px';
          if(tok.id === 'ev_one') inp.style.width = '50px';
          inp.addEventListener('input', () => { userAnswers[tok.id] = inp.value; });
          rowEl.appendChild(inp);

          const hint = document.createElement('span');
          hint.className = 'answer-hint';
          hint.id = 'hint-'+tok.id;
          rowEl.appendChild(hint);
        } else {
          // chip slot (noun or verb)
          const opts = tok.type === 'n' ? NOUN_OPTS : VERB_OPTS;
          const btn = document.createElement('button');
          btn.className = 'slot';
          btn.id = 'slot-'+tok.id;
          btn.dataset.id = tok.id;
          btn.dataset.opts = tok.type;
          btn.textContent = '選擇';
          btn.addEventListener('click', () => { if(!graded) openPicker(tok.id, opts); });
          rowEl.appendChild(btn);

          const hint = document.createElement('span');
          hint.className = 'answer-hint';
          hint.id = 'hint-'+tok.id;
          rowEl.appendChild(hint);
        }
      });

      card.appendChild(rowEl);
    });

    cont.appendChild(card);
  });
}

// ── Picker ────────────────────────────────────
function openPicker(slotId, opts){
  activeSlot = { id: slotId, opts };
  const chips = document.getElementById('pickerChips');
  chips.innerHTML = '';
  opts.forEach(opt => {
    const ch = document.createElement('button');
    ch.className = 'picker-chip' + (userAnswers[slotId] === opt ? ' active' : '');
    ch.textContent = opt;
    ch.addEventListener('click', () => pickOption(opt));
    chips.appendChild(ch);
  });
  document.getElementById('pickerOverlay').classList.add('open');
}

function pickOption(val){
  if(!activeSlot) return;
  const id = activeSlot.id;
  userAnswers[id] = val;
  const btn = document.getElementById('slot-'+id);
  if(btn){ btn.textContent = val; btn.classList.add('filled'); }
  closePicker();
}

function closePicker(){ document.getElementById('pickerOverlay').classList.remove('open'); activeSlot=null; }
function overlayClick(e){ if(e.target===document.getElementById('pickerOverlay')) closePicker(); }

// ── Submit ────────────────────────────────────
function checkPair(idA, idB){
  // Both slots together must cover PAIR_EXPECTED (order-free)
  const uA = norm(userAnswers[idA]||'');
  const uB = norm(userAnswers[idB]||'');
  const matchA = PAIR_EXPECTED.filter(c => isMatch(uA, c));
  const matchB = PAIR_EXPECTED.filter(c => isMatch(uB, c));
  // Each slot matches one of the expected, and they match different ones
  if(matchA.length===0 || matchB.length===0) return [false, false];
  if(matchA[0] !== matchB[0]) return [true, true];
  return [false, false]; // same answer in both slots
}

function submitQuiz(){
  graded = true;
  document.getElementById('quizCont').classList.add('graded');

  let total=0, correct=0;
  const pairedDone = new Set();

  quizData.forEach(q => {
    let qTotal=0, qCorrect=0;

    q.rows.forEach(row => {
      row.forEach(tok => {
        if(typeof tok === 'string') return;
        const id = tok.id;

        // Paired noun slot
        if(PAIR_MAP[id] && !pairedDone.has(id)){
          const partnerId = PAIR_MAP[id];
          pairedDone.add(id); pairedDone.add(partnerId);
          const [okA, okB] = checkPair(id, partnerId);

          [id, partnerId].forEach((sid, i) => {
            const ok = i===0 ? okA : okB;
            total++; qTotal++;
            if(ok){ correct++; qCorrect++; }
            const el = document.getElementById('slot-'+sid);
            const hint = document.getElementById('hint-'+sid);
            if(el){ el.classList.remove('filled'); el.classList.add(ok ? 'correct' : 'wrong'); }
            if(hint && !ok){ hint.textContent = '→ N可數複數 或 N不可數'; }
          });
          return;
        }
        if(pairedDone.has(id)) return;

        const correctArr = ANSWERS[id];
        const user = (userAnswers[id]||'').trim();
        const ok = correctArr.some(c => isMatch(user, c));

        total++; qTotal++;
        if(ok){ correct++; qCorrect++; }

        const el = document.getElementById('slot-'+id);
        const hint = document.getElementById('hint-'+id);

        if(el){
          if(tok.type === 't'){
            el.classList.add(ok ? 'correct' : 'wrong');
            el.disabled = true;
          } else {
            el.classList.remove('filled');
            el.classList.add(ok ? 'correct' : 'wrong');
          }
        }
        if(hint && !ok){
          hint.textContent = '→ '+correctArr.join('/');
        }
      });
    });

    const card = document.getElementById('card-'+q.id);
    card.classList.add(qCorrect===qTotal ? 'graded-correct' : 'graded-wrong');
    const badge = document.getElementById('badge-'+q.id);
    if(badge) badge.textContent = qCorrect===qTotal ? '全對 ✓' : `${qCorrect}/${qTotal}`;
  });

  const wrong = total - correct;
  document.getElementById('resultScore').innerHTML = `${correct}<span> / ${total}</span>`;
  document.getElementById('resultWrong').textContent = wrong===0 ? '🎉 全部答對！' : `答錯 ${wrong} 個空格`;
  document.getElementById('resultBanner').classList.add('show');
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('btnReset').style.display = 'inline-block';
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── Reset ─────────────────────────────────────
function resetQuiz(){
  graded = false;
  userAnswers = {};
  document.getElementById('resultBanner').classList.remove('show');
  document.getElementById('quizCont').classList.remove('graded');
  document.getElementById('btnSubmit').style.display = 'inline-block';
  document.getElementById('btnReset').style.display = 'none';
  renderQuiz();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── Init ──────────────────────────────────────
renderQuiz();
</script>
