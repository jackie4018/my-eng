#app{font-family:var(--font-sans);padding:.75rem;max-width:480px;margin:0 auto;}
.screen{display:none;}.screen.active{display:block;}
.th{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;}
.ts{font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;}

.streak-bar{display:flex;align-items:center;gap:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 12px;margin-bottom:10px;}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

.sr{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-secondary);margin-top:6px;}
.sel{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 9px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;}
.hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:7px;margin-bottom:7px;}
.hp{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px;text-align:center;}
.hn{font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hs{font-size:20px;font-weight:500;}

.tn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--color-text-primary);}
.pw{background:var(--color-background-secondary);border-radius:99px;height:4px;margin-bottom:7px;}
.pb{height:4px;border-radius:99px;background:#1D9E75;transition:width .3s;}

.tp1{background:#E1F5EE;color:#0F6E56;}.tp2{background:#FAECE7;color:#993C1D;}

.qlabel{text-align:center;font-size:12px;color:var(--color-text-secondary);margin-bottom:9px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.cb.no{background:#FAECE7;border-color:#F0997B;color:#993C1D;}

.ti{width:100%;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;font-size:20px;text-align:center;color:var(--color-text-primary);background:var(--color-background-primary);margin-top:7px;outline:none;}

.ti.ok{border-color:#5DCAA5;background:#E1F5EE;color:#0F6E56;}
.ti.no{border-color:#F0997B;background:#FAECE7;color:#993C1D;}
.fb{text-align:center;font-size:14px;font-weight:500;min-height:20px;margin-top:6px;}
.fo{color:#0F6E56;}.fn{color:#993C1D;}
.nb{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);border-radius:var(--border-radius-md);padding:11px;font-size:14px;cursor:pointer;margin-top:8px;font-weight:500;}
.rw{text-align:center;padding:.5rem 0;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.sc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.8rem;text-align:center;}
.sc-n{font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;}
.sc-s{font-size:24px;font-weight:500;}
.s1 .sc-s{color:#0F6E56;}.s2 .sc-s{color:#993C1D;}
.nb-box{background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:var(--border-radius-lg);padding:10px;margin-bottom:9px;text-align:center;}
.mi-wrap{margin-bottom:9px;text-align:left;}
.mi-t{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;}
.mi{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;}
.mi span:last-child{color:#993C1D;font-weight:500;}
.sw-center{text-align:center;padding:1.5rem .5rem;}

/* 對照表 */
.tbl-wrap{overflow-x:auto;}
.vtbl{width:100%;border-collapse:collapse;font-size:13px;}
.vtbl th{background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;padding:7px 8px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;}
.vtbl td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);}
.vtbl tr:last-child td{border-bottom:none;}
.vtbl tr:hover td{background:var(--color-background-secondary);}
.cat-pill{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500;}
.pill-aaa{background:#E1F5EE;color:#085041;}

.pill-abb{background:#E6F1FB;color:#0C447C;}
.pill-abc{background:#FAECE7;color:#712B13;}

.tbl-cat-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}

</div>

  {b:'try',p:'tried',c:'regular'},{b:'use',p:'used',c:'regular'},
  {b:'visit',p:'visited',c:'regular'},{b:'wait',p:'waited',c:'regular'},
  {b:'walk',p:'walked',c:'regular'},{b:'want',p:'wanted',c:'regular'},
  {b:'watch',p:'watched',c:'regular'},{b:'work',p:'worked',c:'regular'},
  {b:'worry',p:'worried',c:'regular'},
];

const CAT_LABELS={aaa:'A-A-A',aba:'A-B-A',abb:'A-B-B',abc:'A-B-C',regular:'規則'};
const CAT_PILL={aaa:'pill-aaa',aba:'pill-aba',abb:'pill-abb',abc:'pill-abc',regular:'pill-reg'};

const BDEFS=[
  {id:'first',icon:'🌱',name:'初試啼聲',fn:s=>s.g>=1},
  {id:'streak3',icon:'🔥',name:'3天連勝',fn:s=>s.streak>=3},
  {id:'streak7',icon:'🏅',name:'7天連勝',fn:s=>s.streak>=7},
  {id:'streak30',icon:'👑',name:'30天連勝',fn:s=>s.streak>=30},
  {id:'perfect',icon:'⭐',name:'滿分達人',fn:s=>s.perfect},
  {id:'speed',icon:'⚡',name:'神速答題',fn:s=>s.speed},
  {id:'vet',icon:'🎓',name:'練習達人',fn:s=>s.g>=20},
  {id:'battle',icon:'⚔️',name:'對戰勝利',fn:s=>s.bw>=1},
];

let ST={streak:0,last:'',best:0,badges:[],g:0,perfect:false,speed:false,bw:0};
try{const d=localStorage.getItem('vq5');if(d)ST=Object.assign({streak:0,last:'',best:0,badges:[],g:0,perfect:false,speed:false,bw:0},JSON.parse(d));}catch(e){}
function sv(){try{localStorage.setItem('vq5',JSON.stringify(ST));}catch(e){}}
function updStreak(){const td=new Date().toDateString(),yd=new Date(Date.now()-86400000).toDateString();if(ST.last===td)return;ST.streak=ST.last===yd?ST.streak+1:1;ST.last=td;if(ST.streak>ST.best)ST.best=ST.streak;sv();}
function chkBadges(){const prev=[...ST.badges];BDEFS.forEach(b=>{if(!ST.badges.includes(b.id)&&b.fn(ST))ST.badges.push(b.id);});sv();return ST.badges.filter(id=>!prev.includes(id));}
function renderBdg(){document.getElementById('bdg').innerHTML=BDEFS.map(b=>`<div class="badge${ST.badges.includes(b.id)?'':' locked'}"><div class="badge-icon">${b.icon}</div><div class="badge-nm">${b.name}</div></div>`).join('');}
function updHome(){document.getElementById('sc').textContent=ST.streak;document.getElementById('bc').textContent=ST.best;document.getElementById('total-ct').textContent=VB.length;}

let selCat='all';
function setCat(el,c){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');selCat=c;}
function pool(){const p=selCat==='all'?VB:VB.filter(v=>v.c===selCat);return p.length<4?VB:p;}
function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){stopT();show('home');updHome();renderBdg();}
function showSetup(){show('setup');}

let G={};let tiv=null;let tl=0;let ansd=false;let flpd=false;let curMode='';

function solo(m){curMode=m;updStreak();G={m,bt:false,s1:0,q:shuf(pool()).slice(0,15),i:0,ms:[],cur:1};document.getElementById('h1n').textContent='';document.getElementById('h2n').textContent='';document.getElementById('h2s').textContent='';document.getElementById('bnr').style.display='none';show('game');rQ();}

function startBattle(){
  const p1=document.getElementById('n1').value||'玩家 1',p2=document.getElementById('n2').value||'玩家 2';
  const r=parseInt(document.getElementById('rds').value),m=document.getElementById('bm').value;
  curMode=m;updStreak();
  const pl=shuf(pool()).slice(0,r*2);
  G={m,bt:true,p1,p2,s1:0,s2:0,q1:pl.slice(0,r),q2:pl.slice(r),m1:[],m2:[],r,i:0,cur:1};
  swScreen(1,true);
}

function swScreen(p,first){stopT();const nm=p===1?G.p1:G.p2;document.getElementById('sw-t').textContent=nm+' 的回合！';document.getElementById('sw-s').textContent='把手機交給 '+nm+'，準備答題！';const sb=document.getElementById('sw-b');if(!first){const on=p===1?G.p2:G.p1,os=p===1?G.s2:G.s1,cl=p===1?'#993C1D':'#0F6E56',bg=p===1?'#FAECE7':'#E1F5EE';sb.innerHTML=`<span style="display:inline-block;padding:3px 13px;border-radius:99px;font-size:12px;font-weight:500;background:${bg};color:${cl}">${on} 得了 ${os} 分</span>`;}else sb.innerHTML='';show('sw');}
function goTurn(){G.i=0;updHUD();const b=document.getElementById('bnr');if(G.bt){b.style.display='block';b.className='tbnr '+(G.cur===1?'tp1':'tp2');b.textContent=(G.cur===1?G.p1:G.p2)+' 的回合';}else b.style.display='none';show('game');rQ();}

function cQ(){return G.bt?(G.cur===1?G.q1:G.q2):G.q;}
function updHUD(){const q=cQ();document.getElementById('h1n').textContent=G.bt?G.p1:'';document.getElementById('h2n').textContent=G.bt?G.p2:'';document.getElementById('h1s').textContent=G.s1;document.getElementById('h2s').textContent=G.bt?G.s2:'';document.getElementById('qn').textContent=(G.i+1)+'/'+q.length;document.getElementById('prg').style.width=(G.i/q.length*100)+'%';}
function stopT(){clearInterval(tiv);tiv=null;}
function startT(cb){stopT();tl=10;uTUI(10);tiv=setInterval(()=>{tl--;uTUI(tl);if(tl<=0){stopT();cb();}},1000);}
function uTUI(t){const a=document.getElementById('arc'),n=document.getElementById('tnum');a.style.strokeDashoffset=131.9*(1-Math.max(0,t/10));a.style.stroke=t<=3?'#D85A30':t<=6?'#EF9F27':'#1D9E75';n.textContent=t;n.style.color=t<=3?'#D85A30':t<=6?'#BA7517':'var(--color-text-primary)';}

function rQ(){
  const q=cQ();if(G.i>=q.length){if(G.bt&&G.cur===1){G.cur=2;swScreen(2,false);}else showRes();return;}
  updHUD();ansd=false;flpd=false;
  const {b,p}=q[G.i];const gc=document.getElementById('gc');
  const isRev=G.m==='reverse';
  const qWord=isRev?p:b;
  const qLbl=isRev?'這是哪個動詞的過去式？':'過去式是？';
  const ansWord=isRev?b:p;

  if(G.m==='flash'){
    stopT();
    gc.innerHTML=`<div style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px">點卡片翻面</div>
<div style="perspective:800px;height:160px;cursor:pointer" onclick="doFlip()"><div style="position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s" id="ci">
<div style="position:absolute;inset:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
<div style="font-size:11px;color:var(--color-text-secondary)">原形</div><div style="font-size:36px;font-weight:500;color:var(--color-text-primary)">${b}</div><div style="font-size:11px;color:var(--color-text-secondary)">過去式是？</div></div>
<div style="position:absolute;inset:0;background:var(--color-background-primary);border:0.5px solid #5DCAA5;border-radius:var(--border-radius-lg);backface-visibility:hidden;transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
<div style="font-size:11px;color:var(--color-text-secondary)">過去式</div><div style="font-size:34px;font-weight:500;color:#0F6E56">${p}</div>
</div></div></div>
<div id="fcb" style="display:none;margin-top:8px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<button style="background:#FAECE7;border:0.5px solid #F0997B;color:#993C1D;border-radius:var(--border-radius-md);padding:12px;font-size:14px;cursor:pointer;font-weight:500" onclick="mFC(false)">❌ 不熟</button>
<button style="background:#E1F5EE;border:0.5px solid #5DCAA5;color:#0F6E56;border-radius:var(--border-radius-md);padding:12px;font-size:14px;cursor:pointer;font-weight:500" onclick="mFC(true)">✅ 記住了</button>
</div></div><button class="btn" onclick="doFlip()">翻面</button>`;
  } else if(G.m==='choice'||G.m==='reverse'){
    const allOpts=isRev?VB.map(v=>v.b):VB.map(v=>v.p);
    const op=gOpts(ansWord,allOpts);
    gc.innerHTML=`<div class="qword">${qWord}</div><div class="qlabel">${qLbl}</div>
<div class="choices" id="ch">${op.map(o=>`<button class="cb" onclick="chC(this,'${o.replace(/'/g,"\\'")}','${ansWord.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
<div class="fb" id="fb"></div><button class="nb" id="nb" style="display:none" onclick="nxtQ()">下一題 →</button>`;
    startT(()=>toQ(ansWord));
  } else {
    const inp_lbl=isRev?'輸入原形…':'輸入過去式…';
    gc.innerHTML=`<div class="qword">${qWord}</div><div class="qlabel">${qLbl}</div>
<input class="ti" id="tp" type="text" placeholder="${inp_lbl}" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')chT()">
<div class="fb" id="fb"></div><button class="nb" id="nb" style="display:none" onclick="nxtQ()">下一題 →</button>`;
    setTimeout(()=>{const e=document.getElementById('tp');if(e)e.focus();},80);
    startT(()=>toQ(ansWord));
  }
}

function doFlip(){flpd=!flpd;document.getElementById('ci').style.transform=flpd?'rotateY(180deg)':'';const f=document.getElementById('fcb');if(f)f.style.display=flpd?'block':'none';}
function mFC(ok){if(ok)addS(1);else addM(cQ()[G.i]);nxtQ();}
function gOpts(c,pool){const o=shuf([...new Set(pool)].filter(x=>x!==c)).slice(0,3);return shuf([c,...o]);}
function addS(n){if(!G.bt||G.cur===1)G.s1+=n;else G.s2+=n;document.getElementById('h1s').textContent=G.s1;if(G.bt)document.getElementById('h2s').textContent=G.s2;}
function addM(v){if(!G.bt||G.cur===1)(G.ms=G.ms||[]).push(v);else(G.m2=G.m2||[]).push(v);}
function toQ(c){if(ansd)return;ansd=true;const fb=document.getElementById('fb');if(fb){fb.textContent='時間到！答案：'+c;fb.className='fb fn';}document.querySelectorAll('.cb').forEach(b=>{if(b.textContent===c)b.classList.add('ok');b.disabled=true;});const tp=document.getElementById('tp');if(tp){tp.disabled=true;tp.classList.add('no');}addM(cQ()[G.i]);const nb=document.getElementById('nb');if(nb)nb.style.display='block';}

function chC(btn,ch,c){if(ansd)return;ansd=true;stopT();document.querySelectorAll('.cb').forEach(b=>{b.onclick=null;b.disabled=true;if(b.textContent===c)b.classList.add('ok');});const fb=document.getElementById('fb');if(ch===c){btn.classList.add('ok');addS(1);fb.textContent='正確！+1 分';fb.className='fb fo';if(tl>=8)ST.speed=true;}else{btn.classList.add('no');addM(cQ()[G.i]);fb.textContent='答案是：'+c;fb.className='fb fn';}document.getElementById('nb').style.display='block';}

function chT(){if(ansd)return;const tp=document.getElementById('tp');const v=tp.value.trim().toLowerCase();const isRev=G.m==='reverse';const {b,p}=cQ()[G.i];const ans=(isRev?b:p).toLowerCase().split('/').map(s=>s.trim());ansd=true;stopT();tp.disabled=true;const fb=document.getElementById('fb');if(ans.includes(v)){tp.classList.add('ok');addS(1);fb.textContent='正確！+1 分';fb.className='fb fo';if(tl>=8)ST.speed=true;}else{tp.classList.add('no');addM(cQ()[G.i]);fb.textContent='答案是：'+(isRev?b:p);fb.className='fb fn';}document.getElementById('nb').style.display='block';}

function nxtQ(){G.i++;rQ();}

function showRes(){
  stopT();ST.g+=1;const tot=G.bt?G.r:G.q.length;
  if(!G.bt&&G.s1===tot)ST.perfect=true;
  if(G.bt&&G.s1>G.s2)ST.bw=(ST.bw||0)+1;
  sv();const nb=chkBadges();show('result');
  if(G.bt){
    const a=G.s1,b2=G.s2;let ic,nm,sb;
    if(a>b2){ic='🏆';nm=G.p1+' 獲勝！';sb=a+' 分 vs '+b2+' 分';}
    else if(b2>a){ic='🏆';nm=G.p2+' 獲勝！';sb=b2+' 分 vs '+a+' 分';}
    else{ic='🤝';nm='平手！';sb='各得 '+a+' 分';}
    document.getElementById('ri').textContent=ic;document.getElementById('rn').textContent=nm;document.getElementById('rs').textContent=sb;
    document.getElementById('rn1').textContent=G.p1;document.getElementById('rn2').textContent=G.p2;
    document.getElementById('rs1').textContent=G.s1;document.getElementById('rs2').textContent=G.s2;
    const am=[...(G.m1||[]),...(G.m2||[])];const uq=[...new Map(am.map(v=>[v.b,v])).values()];
    document.getElementById('mw').innerHTML=uq.length?'<div class="mi-t">需要加強的單字</div>'+uq.map(v=>`<div class="mi"><span>${v.b}</span><span>${v.p}</span></div>`).join(''):'<p style="text-align:center;font-size:13px;color:#0F6E56;margin:1rem 0">全部答對！🎉</p>';
  } else {
    const c=G.s1,pct=Math.round(c/tot*100);
    document.getElementById('ri').textContent=pct>=90?'🌟':pct>=70?'👍':'💪';
    document.getElementById('rn').textContent=c+' / '+tot+' 分';
    document.getElementById('rs').textContent='答對率 '+pct+'%　🔥 '+ST.streak+' 天連勝';
    document.getElementById('rn1').textContent='答對';document.getElementById('rn2').textContent='答錯';
    document.getElementById('rs1').textContent=c;document.getElementById('rs2').textContent=tot-c;
    const ms=G.ms||[];
    document.getElementById('mw').innerHTML=ms.length?'<div class="mi-t">需要加強的單字</div>'+ms.map(v=>`<div class="mi"><span>${v.b}</span><span>${v.p}</span></div>`).join(''):'<p style="text-align:center;font-size:13px;color:#0F6E56;margin:1rem 0">全部答對！🎉</p>';
  }
  if(nb.length){document.getElementById('nbb').style.display='block';document.getElementById('nbi').textContent=nb.map(id=>BDEFS.find(x=>x.id===id).icon).join(' ');}
  else document.getElementById('nbb').style.display='none';
}

function again(){if(G.bt)show('setup');else solo(G.m);}

let tblCat='all';
function showTable(){
  show('table-screen');
  renderTblCats();
  renderTable();
}
function renderTblCats(){
  const cats=['all','aaa','aba','abb','abc','regular'];
  const labels={all:'全部',aaa:'A-A-A',aba:'A-B-A',abb:'A-B-B',abc:'A-B-C',regular:'規則'};
  document.getElementById('tbl-cats').innerHTML=cats.map(c=>`<div class="cat-btn${tblCat===c?' on':''}" onclick="setTblCat('${c}')">${labels[c]}</div>`).join('');
}
function setTblCat(c){tblCat=c;renderTblCats();filterTable();}
function filterTable(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  const rows=VB.filter(v=>{
    const catOk=tblCat==='all'||v.c===tblCat;
    const txtOk=!q||v.b.includes(q)||v.p.includes(q);
    return catOk&&txtOk;
  }).sort((a,b)=>a.b.localeCompare(b.b));
  document.getElementById('tbl-count').textContent=rows.length+' 個';
  document.getElementById('tbl-body').innerHTML=rows.map(v=>`<tr><td>${v.b}</td><td style="font-weight:500;color:#0F6E56">${v.p}</td><td><span class="cat-pill ${CAT_PILL[v.c]}">${CAT_LABELS[v.c]}</span></td></tr>`).join('');
}
function renderTable(){filterTable();}

updHome();renderBdg();
</script>
